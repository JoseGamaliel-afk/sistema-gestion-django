{% load static %}
<!DOCTYPE html>
<html lang="es" class="h-full dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Gestión</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="{% static 'css/styles.css' %}">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
</head>

<!-- 🔥 Fondo tipo dashboard -->
<body class="h-full bg-gray-100 dark:bg-gray-900 transition-theme">

<div class="min-h-full flex items-center justify-center p-4 animate-fade-in">

    <div class="w-full max-w-md">

        <!-- 🔥 Card estilo dashboard -->
        <div class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-xl border border-gray-200 dark:border-gray-700 rounded-2xl shadow-xl overflow-hidden">

            <!-- Header minimalista -->
            <div class="px-8 pt-8 pb-4 text-center">
                <div class="w-16 h-16 bg-primary-100 dark:bg-primary-900/40 rounded-xl flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-cogs text-primary-600 dark:text-primary-400 text-2xl"></i>
                </div>

                <h1 class="text-2xl font-extrabold text-gray-800 dark:text-white">
                    Sistema de Gestión
                </h1>
                <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">
                    Accede a tu cuenta
                </p>
            </div>

            <!-- Form -->
            <form id="login-form" class="px-8 pb-8 space-y-5">
                {% csrf_token %}

                <!-- Error -->
                <div id="error-message" class="hidden p-4 bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 rounded-lg">
                    <p class="text-red-600 dark:text-red-400 text-sm flex items-center">
                        <i class="fas fa-exclamation-circle mr-2"></i>
                        <span id="error-text"></span>
                    </p>
                </div>

                <!-- Verificación -->
                <div id="verificacion-message" class="hidden p-4 bg-yellow-50 dark:bg-yellow-900/30 border border-yellow-200 dark:border-yellow-800 rounded-lg">
                    <p class="text-yellow-700 dark:text-yellow-300 text-sm flex items-start">
                        <i class="fas fa-exclamation-triangle mr-2 mt-0.5"></i>
                        <span>
                            Tu correo no ha sido verificado.
                            <a href="{% url 'seguridad:reenviar_verificacion' %}" 
                               class="underline font-medium hover:text-yellow-800 dark:hover:text-yellow-200">
                                Reenviar verificación
                            </a>
                        </span>
                    </p>
                </div>

                <!-- Correo -->
                <div>
                    <label class="block text-gray-700 dark:text-gray-300 text-sm font-medium mb-2">
                        Correo electrónico
                    </label>
                    <input type="email" id="correo" name="correo"
                        class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-800 dark:text-white rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-theme"
                        placeholder="correo@ejemplo.com" required>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-gray-700 dark:text-gray-300 text-sm font-medium mb-2">
                        Contraseña
                    </label>
                    <div class="relative">
                        <input type="password" id="password" name="password"
                            class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-800 dark:text-white rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-theme"
                            placeholder="••••••••" required>

                        <button type="button" id="toggle-password"
                            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- reCAPTCHA -->
                <div class="flex justify-center">
                    <div class="g-recaptcha" data-sitekey="{{ RECAPTCHA_SITE_KEY }}"></div>
                </div>

                <!-- Botón -->
                <button type="submit" id="submit-btn"
                    class="w-full bg-primary-600 hover:bg-primary-700 text-white py-3 rounded-lg flex items-center justify-center transition-all shadow-sm hover:shadow-md">
                    <span id="btn-text">Iniciar sesión</span>
                    <i id="btn-loader" class="fas fa-spinner fa-spin ml-2 hidden"></i>
                </button>
            </form>

            <!-- Footer -->
            <div class="px-8 pb-6 text-right">
                <a href="{% url 'seguridad:recuperar_password' %}" 
                   class="text-sm text-primary-600 hover:text-primary-700 dark:text-primary-400">
                    ¿Olvidaste tu contraseña?
                </a>
            </div>

        </div>

        <!-- Footer global -->
        <p class="text-center text-gray-500 dark:text-gray-400 text-sm mt-6">
            © 2024 Sistema de Gestión
        </p>

    </div>
</div>

<script src="{% static 'js/login.js' %}"></script>
</body>
</html>
