<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reenviar Verificación - Sistema de Gestión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full bg-gradient-to-br from-primary-600 via-primary-700 to-blue-900">
    <div class="min-h-full flex items-center justify-center p-4">
        <div class="max-w-md w-full">
            <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
                
                <!-- ========================= -->
                <!-- HEADER -->
                <!-- ========================= -->
                <div class="bg-primary-600 px-8 py-8 text-center">
                    <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-envelope text-white text-2xl"></i>
                    </div>
                    <h1 class="text-xl font-bold text-white">Reenviar Verificación</h1>
                    <p class="text-primary-100 mt-2 text-sm">
                        Ingresa tu correo para recibir un nuevo enlace
                    </p>
                </div>

                <div class="px-8 py-8">

                    {% if success %}
                    <!-- ========================= -->
                    <!-- ÉXITO -->
                    <!-- ========================= -->
                    <div class="bg-green-50 border border-green-200 rounded-lg p-4 mb-6">
                        <div class="flex items-start">
                            <i class="fas fa-check-circle text-green-500 text-xl mr-3 mt-0.5"></i>
                            <p class="text-green-700 text-sm">{{ message }}</p>
                        </div>
                    </div>

                    <a href="{% url 'seguridad:login' %}" 
                       class="inline-flex items-center justify-center w-full bg-primary-600 hover:bg-primary-700 text-white font-medium py-3 px-4 rounded-lg transition-colors">
                        <i class="fas fa-sign-in-alt mr-2"></i>
                        Volver al Login
                    </a>

                    <!-- Redirección automática -->
                    <script>
                        setTimeout(() => {
                            window.location.href = "{% url 'seguridad:login' %}";
                        }, 4000);
                    </script>

                    {% else %}

                        {% if error %}
                        <!-- ========================= -->
                        <!-- ERROR -->
                        <!-- ========================= -->
                        <div class="bg-red-50 border border-red-200 rounded-lg p-4 mb-6">
                            <div class="flex items-start">
                                <i class="fas fa-exclamation-circle text-red-500 mr-3 mt-0.5"></i>
                                <p class="text-red-700 text-sm">{{ error }}</p>
                            </div>
                        </div>
                        {% endif %}

                        <!-- ========================= -->
                        <!-- FORM -->
                        <!-- ========================= -->
                        <form method="POST" novalidate>
                            {% csrf_token %}
                            
                            <div class="mb-6">
                                <label class="block text-gray-700 text-sm font-medium mb-2">
                                    <i class="fas fa-envelope mr-2 text-gray-400"></i>
                                    Correo electrónico
                                </label>
                                <input type="email" 
                                       name="correo"
                                       value="{{ request.POST.correo|default:'' }}"
                                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-colors"
                                       placeholder="correo@ejemplo.com"
                                       required>
                            </div>

                            <button type="submit" 
                                    class="w-full bg-primary-600 hover:bg-primary-700 text-white font-medium py-3 px-4 rounded-lg transition-colors">
                                <i class="fas fa-paper-plane mr-2"></i>
                                Enviar Enlace
                            </button>
                        </form>

                        <!-- ========================= -->
                        <!-- FOOTER -->
                        <!-- ========================= -->
                        <div class="mt-6 text-center">
                            <a href="{% url 'seguridad:login' %}" 
                               class="text-primary-600 hover:text-primary-700 text-sm">
                                <i class="fas fa-arrow-left mr-1"></i>
                                Volver al Login
                            </a>
                        </div>

                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
